<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Railway Easy Routing</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-card glass">
      <div class="auth-brand">
        <img src="/favicon.svg" alt="" />
        <div>
          <h1>Railway Easy Routing</h1>
          <p>Sign in to plan routes, track trains, and explore nearby stations.</p>
        </div>
      </div>

      <form id="authForm">
        <div id="nameField">
          <label for="authName">Name</label>
          <input type="text" id="authName" autocomplete="name" />
        </div>

        <label for="authEmail">Email</label>
        <input type="email" id="authEmail" autocomplete="email" required />

        <label for="authPassword">Password</label>
        <input type="password" id="authPassword" autocomplete="current-password" required minlength="6" />

        <button id="authSubmit" type="submit">Create Account</button>
        <p id="authMessage"></p>
      </form>

      <button id="authModeToggle" class="link-button" type="button">Already have an account? Sign in</button>
    </div>
  </div>

  <div id="map"></div>

  <div id="control-panel" class="glass">
    <div class="account-bar">
      <span id="userGreeting">Welcome</span>
      <div>
        <a id="adminLink" href="/admin.html" style="display: none;">Admin</a>
        <button id="logoutBtn" type="button">Logout</button>
      </div>
    </div>

    <div class="tabs">
      <button id="tabRoute" class="active">Find Route</button>
      <button id="tabLive">Live Status</button>
    </div>

    <div id="routePanel">
      <label for="startStation">From:</label>
      <input type="text" id="startStationSearch" autocomplete="off" placeholder="Search station or code" />
      <input type="hidden" id="startStation" />
      <div id="startStationSuggestions" class="station-suggestions"></div>

      <label for="endStation">To:</label>
      <input type="text" id="endStationSearch" autocomplete="off" placeholder="Search station or code" />
      <input type="hidden" id="endStation" />
      <div id="endStationSuggestions" class="station-suggestions"></div>

      <label for="travelDate">Date:</label>
      <input type="date" id="travelDate" />

      <button id="findRouteBtn">Search</button>
    </div>

    <div id="livePanel" style="display: none;">
      <label for="trainSelect">Select Train:</label>
      <select id="trainSelect"></select>

      <label for="liveTime">Time:</label>
      <input type="time" id="liveTime" />
      
      <div id="liveStatusText" style="margin-top: 10px; font-size: 0.9em; color: #ff9800; font-weight: bold;"></div>
    </div>

    <div class="creator-link">
      <span>Say thanks to creator</span>
      <a href="https://devarajan.site" target="_blank" rel="noopener noreferrer">Devarajan</a>
    </div>
  </div>

  <div id="results" class="glass"></div>

  <div id="tourOverlay" class="tour-overlay">
    <div class="tour-card glass">
      <p class="tour-kicker">Quick tour</p>
      <h2 id="tourTitle">Find routes between stations</h2>
      <p id="tourText">Type station names or codes, choose a date, and search. The app checks online train data first.</p>
      <div class="tour-progress">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <button id="tourNextBtn" type="button">Next</button>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="/leaflet/leaflet.js"></script>
  <script src="/main.js?v=20260519-live-autostart" type="module"></script>
</body>
</html>
